{% extends "base.html" %}

{% block title %}Login – PortalAuth{% endblock %}

{% block nav_links %}{% endblock %}

{% block content %}
<div class="pa-login-wrap">
  <article class="pa-login-card">
    <header>
      <hgroup>
        <h1>🔑</h1>
        <h2>PortalAuth</h2>
        <p>Enter your 6-digit authenticator code</p>
      </hgroup>
    </header>

    {% if error %}
    <p class="pa-error" role="alert">
      ⚠️ Invalid code — please try again.
    </p>
    {% endif %}

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}" />
      <div class="pa-pin-wrap">
        <input
          type="text"
          name="token"
          inputmode="numeric"
          pattern="[0-9]{6}"
          maxlength="6"
          placeholder="000000"
          autocomplete="one-time-code"
          autofocus
          required
          class="pa-pin-input"
        />
      </div>
      <button type="submit" class="contrast pa-login-btn">Authenticate</button>
    </form>
  </article>
</div>
{% endblock %}
